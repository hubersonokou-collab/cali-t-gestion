<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cali-T - Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #FAF8F5;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: #2D7D3A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
      font-weight: bold;
      color: white;
    }
    h1 { color: #2D7D3A; font-size: 24px; margin-bottom: 12px; }
    p { color: #666; font-size: 16px; line-height: 1.5; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #2D7D3A;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .btn:hover { background: #1B5E27; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">C</div>
    <h1>Vous etes hors ligne</h1>
    <p>Verifiez votre connexion internet et reessayez. Vos articles du panier sont sauvegardes.</p>
    <button class="btn" onclick="window.location.reload()">Reessayer</button>
  </div>
</body>
</html>
